<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: 'Pretendard', sans-serif;
    background: #fff5f8;
    min-height: 100vh; min-height: calc(var(--vh, 1vh) * 100);
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow: hidden;
    touch-action: none;
    user-select: none;
  }
  #screen {
    width: 100%;
    max-width: 420px;
    min-height: 100vh; min-height: calc(var(--vh, 1vh) * 100);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 24px 16px;
    position: relative;
  }
  .header {
    width: 100%;
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-bottom: 16px;
  }
  .score-box {
    background: white;
    border-radius: 16px;
    padding: 8px 15px;
    text-align: center;
    box-shadow: 0 2px 12px rgba(255,107,157,0.12);
    width: 80px;
  }
  .score-label { font-size: 11px; color: #c06080; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; }
  .score-value { font-size: 28px; font-weight: 900; color: #ff6b9d; line-height: 1; }
  .timer-box .score-value { color: #ff6b9d; }
  .timer-box.warning .score-value { color: #F44336; animation: pulse 0.5s ease infinite alternate; }
  @keyframes pulse { from { opacity: 1; } to { opacity: 0.55; } }

  .char-wrap {
    position: relative;
    width: 280px;
    height: 280px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: 8px;
  }
  .char-wrap svg {
    width: 100%;
    height: 100%;
    transition: transform 0.12s ease;
    filter: drop-shadow(0 8px 24px rgba(241,99,33,0.15));
  }
  .char-wrap.squeezed svg { transform: none; }
  @keyframes squishAnim {
    0%   { transform: scale(1, 1); }
    15%  { transform: scale(1.08, 0.88); }
    100% { transform: scale(1, 1); }
  }
  .char-wrap.squishing svg { animation: squishAnim 0.5s ease-out; }
  .char-wrap.danger-shake svg { animation: shakeChar 0.3s ease; }
  @keyframes shakeChar {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-4px) rotate(-1deg); }
    75% { transform: translateX(4px) rotate(1deg); }
  }

  .ripple {
    position: absolute; border-radius: 50%; pointer-events: none;
    animation: rippleAnim 0.5s ease-out forwards;
    border: 3px solid rgba(241,99,33,0.4);
  }
  @keyframes rippleAnim { from { transform: scale(0.2); opacity: 1; } to { transform: scale(2.8); opacity: 0; } }

  .heart-particle {
    position: absolute; font-size: 18px; pointer-events: none;
    animation: heartFloat 0.9s ease-out forwards;
  }
  @keyframes heartFloat {
    0% { opacity: 1; transform: translate(0,0) scale(1); }
    100% { opacity: 0; transform: translate(var(--dx), -65px) scale(0.3); }
  }

  .combo-text {
    position: absolute; top: -10px; left: 50%; transform: translateX(-50%);
    font-size: 19px; font-weight: 900; color: #ff6b9d;
    text-shadow: 0 1px 6px rgba(255,107,157,0.3);
    pointer-events: none; white-space: nowrap;
    animation: comboFloat 0.8s ease-out forwards;
  }
  @keyframes comboFloat {
    0%   { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); }
    100% { opacity: 0; transform: translateX(-50%) translateY(-32px) scale(1.15); }
  }

  .pressure-warning .emoji-icon {
    display: inline-block;
    width: 40px;
    height: 40px;
    vertical-align: middle;
    margin-right: 4px;
    position: relative;
    top: -2px;
  }
  .pressure-warning {
    font-size: 20px; font-weight: 700; color: #c06080;
    text-align: center; margin-bottom: 6px; height: 36px; margin-top: 4px;
  }
  .pressure-warning.warn { color: #FF9800; }
  .pressure-warning.danger { color: #F44336; animation: pulse 0.5s ease infinite alternate; }
  .instruction {
    margin-top: 14px; font-size: 13px; color: #c0a0a8;
    font-weight: 600; text-align: center; line-height: 1.6;
  }

  #pop-screen {
    display: none; position: fixed; inset: 0;
    background: rgba(241,99,33,0.95);
    flex-direction: column; align-items: center; justify-content: center; z-index: 100;
    animation: fadeInPop 0.3s ease;
    overflow-y: auto;
    padding: 16px;
  }
  #pop-screen.show { display: flex; }
  @keyframes fadeInPop { from { opacity: 0; transform: scale(1.04); } to { opacity: 1; transform: scale(1); } }
  .pop-char { width: 110px; height: 110px; margin-bottom: 4px; animation: popBounce 0.5s ease; }
  .pop-char svg { width: 100%; height: 100%; }
  @keyframes popBounce { 0% { transform: scale(0); } 60% { transform: scale(1.25); } 100% { transform: scale(1); } }
  .pop-title { font-size: 24px; font-weight: 900; color: white; margin: 2px 0; }
  .pop-sub { font-size: 13px; color: rgba(255,255,255,0.85); margin-bottom: 4px; }
  .pop-score { font-size: 44px; font-weight: 900; color: white; margin: 4px 0 12px; }
  .pop-score span { font-size: 18px; font-weight: 700; opacity: 0.8; }
  .btn-submit:disabled, .nick-wrap input:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }
  .btn-retry, .share-btn, .btn-ranking {
    background: white; color: #f16321; border: none; border-radius: 99px;
    padding: 8px 14px; font-size: 13px; font-weight: 900; cursor: pointer;
    transition: transform 0.15s; font-family: inherit; white-space: nowrap;
    display: inline-flex; align-items: center; justify-content: center;
    line-height: 1;
    padding-top: 13px;
    padding-bottom: 11px;
  }
  .btn-retry:active, .share-btn:active, .btn-ranking:active { transform: scale(0.96); }
  .nick-wrap { display: flex; gap: 8px; margin: 6px 0 4px; }
  .nick-wrap input {
    flex: 1; border: none; border-radius: 99px; padding: 10px 16px;
    font-size: 15px; font-family: inherit; outline: none; min-width: 0;
  }
  .btn-submit {
    background: white; color: #f16321; border: none; border-radius: 99px;
    padding: 10px 18px; font-size: 15px; font-weight: 900; cursor: pointer;
    font-family: inherit; white-space: nowrap; transition: transform 0.15s;
  }
  .btn-submit:active { transform: scale(0.96); }
  #submit-msg { font-size: 12px; color: rgba(255,255,255,0.85); min-height: 16px; margin-bottom: 2px; padding-left: 8px; }
  .pop-btns { display: flex; gap: 8px; justify-content: center; }
  .pop-btns .btn-retry, .pop-btns .share-btn, .pop-btns .btn-ranking { flex: 1; justify-content: center; }

  #ranking-list {
    width: 100%; max-height: 220px; overflow-y: auto; margin-top: 12px;
    scrollbar-width: thin;
    scrollbar-color: rgba(255,255,255,0.3) transparent;
  }
  #ranking-list::-webkit-scrollbar { width: 4px; }
  #ranking-list::-webkit-scrollbar-track { background: transparent; }
  #ranking-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.3); border-radius: 99px; }
  .rank-item {
    display: flex; align-items: center; justify-content: space-between;
    background: rgba(255,255,255,0.15); border-radius: 12px;
    padding: 10px 16px; margin-bottom: 8px; color: white;
  }
  .rank-num { font-size: 18px; font-weight: 900; width: 30px; }
  .rank-nick { flex: 1; font-size: 16px; font-weight: 700; text-align: left; padding: 0 8px; }
  .rank-score { font-size: 18px; font-weight: 900; }
  .rank-item.top1 { background: rgba(255,215,0,0.35); }
  .rank-item.top2 { background: rgba(255,255,255,0.35); }
  .rank-item.top3 { background: rgba(192,192,192,0.3); }
</style>

}
setVH();
window.addEventListener('resize', setVH);

  function showPressedBriefly() {
    if (gameOver) return;
    setSVG(SVG_PRESSED);
    charWrap.classList.remove('squishing');
    void charWrap.offsetWidth;
    charWrap.classList.add('squishing');
    clearTimeout(pressedTimer);
    pressedTimer = setTimeout(function() {
      pressedTimer = null;
      charWrap.classList.remove('squishing');
      updateCharState();
    }, 500);
  }

  function spawnTimeBonus() {
    var el = document.createElement('div');
    el.style.cssText = 'position:absolute;top:10px;left:50%;transform:translateX(-50%);font-size:16px;font-weight:900;color:#ff6b9d;pointer-events:none;white-space:nowrap;animation:comboFloat 1s ease-out forwards;z-index:10;';
    el.textContent = '⏱️ +5초!';
    document.getElementById('char-wrap').appendChild(el);
    setTimeout(function(){ el.remove(); }, 1000);
  }

  function spawnRipple(x, y) {
    var r = document.createElement('div'); r.className = 'ripple';
    var size = 50; r.style.cssText = 'width:'+size+'px;height:'+size+'px;left:'+(x-size/2)+'px;top:'+(y-size/2)+'px;';
    charWrap.appendChild(r); setTimeout(function(){r.remove();}, 500);
  }

  function spawnHeart(x, y) {
    var hearts = ['💕','💗','💖','💓','✨','🌸','💞'];
    var el = document.createElement('div'); el.className = 'heart-particle';
    var dx = (Math.random() - 0.5) * 80;
    el.style.cssText = 'left:'+x+'px;top:'+y+'px;--dx:'+dx+'px;';
    el.textContent = hearts[Math.floor(Math.random() * hearts.length)];
    charWrap.appendChild(el); setTimeout(function(){el.remove();}, 900);
  }

  function spawnCombo() {
    if (combo < 4) return;
    var el = document.createElement('div'); el.className = 'combo-text';
    el.textContent = combo >= 10 ? '🔥 '+combo+' 연속!!' : combo >= 6 ? '✨ '+combo+' 연속!' : combo+' 연속!';
    charWrap.appendChild(el); setTimeout(function(){el.remove();}, 3000);
  }

  function handleTap(e) {
    if (gameOver) return; e.preventDefault();
    if (!gameStarted) { gameStarted = true; startCountdown(); }
    var rect = charWrap.getBoundingClientRect();
    var touch = e.touches ? e.touches[0] : e;
    var x = touch.clientX - rect.left, y = touch.clientY - rect.top;
    var now = Date.now(), elapsed = now - lastTapTime; lastTapTime = now;
    var addP = PRESSURE_PER_TAP;
    if (elapsed < FAST_TAP_THRESHOLD) { addP += (FAST_TAP_THRESHOLD-elapsed)/FAST_TAP_THRESHOLD*16; combo++; }
    else { combo = 1; }
    pressure = Math.min(pressure + addP, MAX_PRESSURE);

    // 콤보 배율 (연속 탭할수록 배율 증가, 최대 x4)
    var comboMultiplier = elapsed < FAST_TAP_THRESHOLD
      ? Math.min(1 + (combo - 1) * 0.3, 4)
      : 1;

    // 압력 보너스: 구간별 점수 (4단계)
    var pct = pressure / MAX_PRESSURE;
    var pressureBonus = pct >= 0.9 ? 4 : pct >= 0.7 ? 3 : pct >= 0.5 ? 2 : pct >= 0.3 ? 1 : 0;

    // 최종 점수 = (1 + 압력보너스) × 콤보배율
    var gained = Math.ceil((1 + pressureBonus) * comboMultiplier);
    score += gained; scoreEl.textContent = score;
    if (best < score) { best = score; bestEl.textContent = best; }

    // 목표 점수 달성 시 +5초
    if (nextBonusIdx < timeBonus.length && score >= timeBonus[nextBonusIdx]) {
      nextBonusIdx++;
      timeLeft = Math.min(timeLeft + 5, 99);
      timerDisplay.textContent = timeLeft;
      timerBox.classList.remove('warning');
      spawnTimeBonus();
    }
    spawnRipple(x, y);
    if (score % 3 === 0) spawnHeart(x - 10, y - 10);
    spawnCombo();
    updateMeter();
    if (pressure >= MAX_PRESSURE) { triggerPop(); return; }
    showPressedBriefly();
    if (pressure >= DANGER_THRESHOLD) {
      charWrap.classList.add('danger-shake');
      setTimeout(function(){charWrap.classList.remove('danger-shake');}, 300);
    }
  }

  function triggerPop() {
    if (gameOver) return; gameOver = true; clearInterval(decayInterval); clearInterval(countdownInterval);
    setSVG(SVG_DANGER);
    setTimeout(function() {
      popChar.innerHTML = SVG_DANGER;
      document.getElementById('pop-title').textContent = '볼이 터졌어요!';
      document.getElementById('pop-sub').textContent = '다음엔 더 조심히 주물러줘요…';
      popScoreEl.innerHTML = score + ' <span>점</span>';
      var savedNick = localStorage.getItem('cheek_nick') || '';
      document.getElementById('nick-input').value = savedNick;
      popScreen.classList.add('show');
      loadRanking();
    }, 220);
  }

  function startCountdown() {
    timeLeft = 30;
    timerDisplay.textContent = timeLeft;
    timerBox.classList.remove('warning');
    clearInterval(countdownInterval);
    countdownInterval = setInterval(function() {
      if (gameOver) return;
      timeLeft--;
      timerDisplay.textContent = timeLeft;
      if (timeLeft <= 10) timerBox.classList.add('warning');
      if (timeLeft <= 0) {
        clearInterval(countdownInterval);
        triggerTimeUp();
      }
    }, 1000);
  }

  function triggerTimeUp() {
    if (gameOver) return;
    gameOver = true;
    clearInterval(decayInterval);
    clearInterval(countdownInterval);
    setSVG(SVG_NORMAL);
    setTimeout(function() {
      popChar.innerHTML = SVG_NORMAL;
      document.getElementById('pop-title').textContent = '시간 종료!';
      document.getElementById('pop-sub').textContent = '30초 동안 열심히 주물렀어요!';
      popScoreEl.innerHTML = score + ' <span>점</span>';
      var savedNick = localStorage.getItem('cheek_nick') || '';
      document.getElementById('nick-input').value = savedNick;
      popScreen.classList.add('show');
      loadRanking();
    }, 200);
  }

  function startDecay() {
    decayInterval = setInterval(function() {
      if (gameOver) return;
      if (pressure > 0) { pressure = Math.max(0, pressure - DECAY_RATE); updateMeter(); }
    }, 30);
  }

  function resetGame() {
    gameOver = false; score = 0; pressure = 0; combo = 0; lastTapTime = 0;

    timeLeft = 30; timerDisplay.textContent = 30; timerBox.classList.remove('warning');

  async function submitScore() {
    var nick = document.getElementById('nick-input').value.trim();
    var msg = document.getElementById('submit-msg');
    if (!nick) { msg.textContent = '닉네임을 입력해주세요!'; return; }
    if (hasBannedWord(nick)) { msg.textContent = '사용할 수 없는 닉네임이에요!'; return; }
    msg.textContent = '등록 중...';
    document.getElementById('submit-btn').disabled = true;
    try {
      var res = await fetch(SUPA_URL + '/rest/v1/scores', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'apikey': SUPA_KEY,
          'Authorization': 'Bearer ' + SUPA_KEY
        },
        body: JSON.stringify({ nickname: nick, score: score })
      });
      if (res.ok) {
        localStorage.setItem('cheek_nick', nick);
        msg.textContent = '✓ 등록 완료!';
        document.getElementById('nick-input').disabled = true;
        document.getElementById('submit-btn').disabled = true;
        loadRanking();
      } else {
        msg.textContent = '등록 실패. 다시 시도해주세요.';
        document.getElementById('submit-btn').disabled = false;
      }
    } catch(e) {
      msg.textContent = '오류가 발생했어요.';
      document.getElementById('submit-btn').disabled = false;
    }
  }

  async function loadRanking() {
    var list = document.getElementById('ranking-list');
    list.innerHTML = '<div style="color:white;text-align:center;padding:20px;">불러오는 중...</div>';
    try {
      var res = await fetch(SUPA_URL + '/rest/v1/scores?select=nickname,score&order=score.desc&limit=20', {
        headers: { 'apikey': SUPA_KEY, 'Authorization': 'Bearer ' + SUPA_KEY }
      });
      var data = await res.json();
      list.innerHTML = '';
      var rank = 1;
      data.forEach(function(row, i) {
        if (i > 0 && row.score < data[i-1].score) rank++;
        var cls = rank === 1 ? 'rank-item top1' : rank === 2 ? 'rank-item top2' : rank === 3 ? 'rank-item top3' : 'rank-item';
        var medal = rank === 1 ? '🥇' : rank === 2 ? '🥈' : rank === 3 ? '🥉' : rank + '.';
        list.innerHTML += '<div class="' + cls + '"><span class="rank-num">' + medal + '</span><span class="rank-nick">' + row.nickname + '</span><span class="rank-score">' + row.score + '점</span></div>';
      });
      if (data.length === 0) list.innerHTML = '<div style="color:white;text-align:center;padding:20px;">아직 기록이 없어요!</div>';
    } catch(e) {
      list.innerHTML = '<div style="color:white;text-align:center;">불러오기 실패</div>';
    }
  }

  async function loadBest() {
    try {
      var res = await fetch(SUPA_URL + '/rest/v1/scores?select=score&order=score.desc&limit=1', {
        headers: { 'apikey': SUPA_KEY, 'Authorization': 'Bearer ' + SUPA_KEY }
      });
      var data = await res.json();
      if (data && data.length > 0) {
        best = data[0].score;
        bestEl.textContent = best;
      }
    } catch(e) {}
  }
  loadBest();

  document.getElementById('submit-btn').addEventListener('click', submitScore);

  document.getElementById('retry-btn').addEventListener('click', function() {
    var savedNick = localStorage.getItem('cheek_nick') || '';
    document.getElementById('nick-input').value = savedNick;
    document.getElementById('nick-input').disabled = false;
    document.getElementById('submit-msg').textContent = '';
    document.getElementById('submit-btn').disabled = false;
    resetGame();

    document.getElementById('result-view').style.display = 'block';
  });


})();
